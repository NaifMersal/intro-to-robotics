<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel Micro-Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #040e1a; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { z-index: 10; }
        .back-btn { display: block !important; }
    </style>
</head>
<body>
    <canvas id="simulationCanvas"></canvas>

    <div id="ui-layer">
        <!-- Controls Panel Placeholder -->
        <div id="controls-placeholder"></div>

        <button id="btnBack" class="back-btn view-btn">⬅ Back to Circuit Flow</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="../js/ui_components.js"></script>
    <script src="../js/micro/base.js"></script>
    <script src="../js/micro/wheel.js"></script>
    <script src="../js/micro/micro_app.js"></script>
</body>
</html>
