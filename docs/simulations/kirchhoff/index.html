<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirchhoff's Laws Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #040e1a;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e2e8f0;
    }
    #app {
      display: flex; flex-direction: column;
      height: 100vh; padding: 8px 10px 6px; gap: 6px;
    }
    #tab-bar { display: flex; gap: 8px; flex-shrink: 0; }
    .tab-btn {
      padding: 5px 16px;
      border: 1.5px solid transparent; border-radius: 6px;
      font: 600 13px/1 'Inter', system-ui, sans-serif;
      cursor: pointer; background: #0d1f33; color: #64748b;
      transition: all .2s;
    }
    .tab-btn.active { background: #00C9A7; color: #040e1a; border-color: #00C9A7; }
    .mode-toggle {
      margin-left: auto;
      display: flex; gap: 4px; background: #0d1f33; padding: 3px; border-radius: 6px;
    }
    .mode-btn {
      padding: 4px 10px; border: none; border-radius: 4px;
      font: 700 11px 'Inter', sans-serif; cursor: pointer;
      background: transparent; color: #64748b; transition: all .2s;
    }
    .mode-btn.active { background: #38bdf8; color: #040e1a; }
    .mode-btn.active.electric { background: #00C9A7; }
    canvas { flex: 1 1 0; width: 100%; display: block; border-radius: 6px; }
    #controls {
      display: flex; gap: 20px; justify-content: center;
      flex-wrap: wrap; flex-shrink: 0;
    }
    .ctrl-panel { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .ctrl-group { display: flex; align-items: center; gap: 8px; }
    .ctrl-group label { font-size: 12px; color: #94a3b8; white-space: nowrap; }
    .ctrl-group input[type=range] { width: 110px; accent-color: #00C9A7; cursor: pointer; }
    .ctrl-group .val { font: 600 12px/1 'Inter', system-ui, sans-serif; color: #00C9A7; min-width: 44px; }
  </style>
</head>
<body>
<div id="app">
  <div id="tab-bar">
    <button class="tab-btn" id="btn-kvl" onclick="setTab('kvl')">⚡ KVL — Voltage Loop</button>
    <button class="tab-btn" id="btn-kcl" onclick="setTab('kcl')">⑃ KCL — Current Junction</button>
    <button class="tab-btn" id="btn-pipe" onclick="setTab('pipe')">🚰 Pipe Logic</button>
    <div class="mode-toggle">
      <button class="mode-btn electric" id="mode-electric" onclick="setMode('electric')">ELECTRIC</button>
      <button class="mode-btn water" id="mode-water" onclick="setMode('water')">WATER</button>
    </div>
  </div>
  <canvas id="c"></canvas>
  <div id="controls">
    <div id="ctrl-kvl" class="ctrl-panel">
      <div class="ctrl-group">
        <label>R₁</label>
        <input type="range" id="kvl-r1" min="1" max="9" value="3" oninput="onKvlSlider()">
        <span class="val" id="kvl-r1-v">3 Ω</span>
      </div>
      <div class="ctrl-group">
        <label>R₂</label>
        <input type="range" id="kvl-r2" min="1" max="9" value="3" oninput="onKvlSlider()">
        <span class="val" id="kvl-r2-v">3 Ω</span>
      </div>
    </div>
    <div id="ctrl-kcl" class="ctrl-panel" style="display:none">
      <div class="ctrl-group">
        <label>R₁ (left)</label>
        <input type="range" id="kcl-r1" min="1" max="9" value="3" oninput="onKclSlider()">
        <span class="val" id="kcl-r1-v">3 Ω</span>
      </div>
      <div class="ctrl-group">
        <label>R₂ (right)</label>
        <input type="range" id="kcl-r2" min="1" max="9" value="3" oninput="onKclSlider()">
        <span class="val" id="kcl-r2-v">3 Ω</span>
      </div>
    </div>
  </div>
</div>
<script>
// ─── State ───────────────────────────────────────────────────────────────────
const VSUPPLY = 5;
let kvlR1 = 3, kvlR2 = 3;
let kclR1 = 3, kclR2 = 3;
let tab = 'kvl';
let mode = 'electric'; // 'electric' or 'water'

function getResUnit() { return mode === 'water' ? 'R-units' : 'Ω'; }
function getVoltUnit() { return mode === 'water' ? 'psi' : 'V'; }
function getVoltVal(v) { return mode === 'water' ? (v * 2).toFixed(1) : v.toFixed(1); }
function getAmpUnit() { return mode === 'water' ? 'L/s' : 'mA'; }
function getAmpVal(i) { return mode === 'water' ? (i * 10).toFixed(1) : (i * 1000).toFixed(0); }


// ─── Canvas ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
let mx = -100, my = -100; // mouse pos

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  W = rect.width; H = rect.height;
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  kvlGeo = null; kclGeo = null; // force geometry recompute
}
window.addEventListener('resize', resizeCanvas);
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mx = e.clientX - rect.left;
  my = e.clientY - rect.top;
});
canvas.addEventListener('mouseleave', () => { mx = -100; my = -100; });

// ─── Path utilities ───────────────────────────────────────────────────────────
function buildPath(pts) {
  const segs = [];
  let total = 0;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy) || 0.001;
    segs.push({ ax: a.x, ay: a.y, bx: b.x, by: b.y, len, cum: total, idx: i });
    total += len;
  }
  return { segs, total };
}

function pathPos(path, d) {
  d = ((d % path.total) + path.total) % path.total;
  for (const s of path.segs) {
    if (d <= s.cum + s.len + 1e-6) {
      const t = Math.min(1, (d - s.cum) / s.len);
      return { x: s.ax + t * (s.bx - s.ax), y: s.ay + t * (s.by - s.ay), segIdx: s.idx };
    }
  }
  const last = path.segs[path.segs.length - 1];
  return { x: last.bx, y: last.by, segIdx: last.idx };
}

// ─── Draw helpers ────────────────────────────────────────────────────────────
function rr(x, y, w, h, radii) {
  if (typeof radii === 'number') radii = [radii, radii, radii, radii];
  const [tl, tr, br, bl] = radii.map(r => Math.max(0, r));
  ctx.beginPath();
  ctx.moveTo(x + tl, y);
  ctx.lineTo(x + w - tr, y);
  ctx.arcTo(x+w, y,   x+w, y+tr,  Math.max(0.01,tr));
  ctx.lineTo(x+w, y+h-br);
  ctx.arcTo(x+w, y+h, x+w-br, y+h, Math.max(0.01,br));
  ctx.lineTo(x+bl, y+h);
  ctx.arcTo(x,   y+h, x,   y+h-bl, Math.max(0.01,bl));
  ctx.lineTo(x, y+tl);
  ctx.arcTo(x,   y,   x+tl, y,     Math.max(0.01,tl));
  ctx.closePath();
}

function drawDot(x, y, r, color) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r * 2.4);
  g.addColorStop(0, color);
  g.addColorStop(0.45, color + 'bb');
  g.addColorStop(1, color + '00');
  ctx.beginPath();
  ctx.arc(x, y, r * 2.4, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function lerpHex(hexA, hexB, t) {
  const a = hexToRgb(hexA), b = hexToRgb(hexB);
  const r = Math.round(a[0] + t*(b[0]-a[0]));
  const g = Math.round(a[1] + t*(b[1]-a[1]));
  const bl = Math.round(a[2] + t*(b[2]-a[2]));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bl.toString(16).padStart(2,'0')}`;
}

function drawArrow(x1, y1, x2, y2, color, size) {
  const angle = Math.atan2(y2-y1, x2-x1);
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(mx + Math.cos(angle)*size, my + Math.sin(angle)*size);
  ctx.lineTo(mx + Math.cos(angle+2.4)*size*0.7, my + Math.sin(angle+2.4)*size*0.7);
  ctx.lineTo(mx + Math.cos(angle-2.4)*size*0.7, my + Math.sin(angle-2.4)*size*0.7);
  ctx.closePath();
  ctx.fill();
}

function distToSeg(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy || 1)));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}



function drawProbe(x, y, v, i) {
  const bw = 95, bh = 45;
  const bx = x + 15, by = y - bh - 15;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10;
  ctx.fillStyle = 'rgba(15, 23, 42, 0.9)';
  const themeCol = mode === 'water' ? '#38bdf8' : '#00C9A7';
  ctx.strokeStyle = themeCol; ctx.lineWidth = 1.5;
  rr(bx, by, bw, bh, 6); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#94a3b8'; ctx.font = '600 10px Inter, sans-serif';
  ctx.fillText(mode === 'water' ? 'FLOW SENSOR' : 'PROBE', bx + 8, by + 10);
  ctx.font = '700 12px Inter, sans-serif';
  
  if (mode === 'water') {
    ctx.fillStyle = '#38bdf8'; ctx.fillText(`P: ${v.toFixed(2)} psi`, bx + 8, by + 22);
    ctx.fillStyle = '#7dd3fc'; ctx.fillText(`Q: ${(i * 10).toFixed(1)} L/s`, bx + 8, by + 34);
  } else {
    ctx.fillStyle = '#00C9A7'; ctx.fillText(`V: ${v.toFixed(2)} V`, bx + 8, by + 22);
    ctx.fillStyle = '#38bdf8'; ctx.fillText(`A: ${(i * 1000).toFixed(1)} mA`, bx + 8, by + 34);
  }
  
  // Probe tip line
  ctx.beginPath(); ctx.strokeStyle = mode === 'water' ? '#38bdf8' : '#ef4444'; ctx.lineWidth = 2;
  ctx.moveTo(x, y); ctx.lineTo(x + 10, y - 10); ctx.stroke();
  ctx.restore();
}

// ─── KVL simulation ──────────────────────────────────────────────────────────
/*
  Series circuit (clockwise from battery+):
  wp0: top-left (bat+)  → wp1: before R1 → wp2: after R1
  → wp3: before R2 → wp4: after R2 → wp5: top-right
  → wp6: bottom-right → wp7: bottom-left (bat-) → [battery] → wp0

  Segment 7 (wp7→wp0) = battery segment (energy added here).
  Voltage at each waypoint:
    wp0=5V, wp1=5V, wp2=5-v1, wp3=5-v1, wp4≈0, wp5=0, wp6=0, wp7=0
*/
const KVL_DOTS = 20;
let kvlGeo = null, kvlPath = null, kvlDots = [];

function buildKVLGeo() {
  const COMP_W = Math.min(80, W * 0.11);
  const top    = H * 0.19;
  const bot    = H * 0.80;
  const batX   = W * 0.08;
  const r1x    = W * 0.24;
  const r2x    = W * 0.45;
  const rightX = W * 0.66;

  kvlPath = buildPath([
    { x: batX,          y: top },  // 0
    { x: r1x,           y: top },  // 1
    { x: r1x + COMP_W,  y: top },  // 2
    { x: r2x,           y: top },  // 3
    { x: r2x + COMP_W,  y: top },  // 4
    { x: rightX,        y: top },  // 5
    { x: rightX,        y: bot },  // 6
    { x: batX,          y: bot },  // 7
  ]);

  kvlDots = Array.from({ length: KVL_DOTS }, (_, i) => ({
    d: (i / KVL_DOTS) * kvlPath.total
  }));

  kvlGeo = { top, bot, batX, r1x, r2x, rightX, COMP_W, _W: W, _H: H };
}

function drawKVL(dt) {
  if (!kvlGeo || Math.abs(kvlGeo._W - W) > 2) buildKVLGeo();
  const { top, bot, batX, r1x, r2x, rightX, COMP_W } = kvlGeo;

  const I  = VSUPPLY / (kvlR1 + kvlR2);
  const v1 = I * kvlR1;
  const v2 = I * kvlR2;

  // Speed proportional to current (higher R → slower dots = lower current)
  const baseSpeed = W * 0.13;
  const baseI = VSUPPLY / 6; // baseline: R1=R2=3
  const speed = baseSpeed * (I / baseI) * dt;
  for (const dot of kvlDots) dot.d = (dot.d + speed) % kvlPath.total;

  ctx.clearRect(0, 0, W, H);

  const batH   = H * 0.20;
  const batMidY = (top + bot) / 2;
  const compH  = H * 0.086;

  // ── Wire styling ──
  const wireColor = mode === 'water' ? '#1e40af' : '#1e3a5a';
  const pipeWidth = mode === 'water' ? 8 : 4;
  ctx.strokeStyle = wireColor;
  ctx.lineWidth = pipeWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Top wire segments (around components)
  function wireSeg(x1,y1,x2,y2) {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  wireSeg(batX, top, r1x, top);
  wireSeg(r1x + COMP_W, top, r2x, top);
  wireSeg(r2x + COMP_W, top, rightX, top);
  wireSeg(rightX, top, rightX, bot);
  wireSeg(rightX, bot, batX, bot);
  // Battery wire (left side, skip battery body)
  wireSeg(batX, top, batX, batMidY - batH/2);
  wireSeg(batX, batMidY + batH/2, batX, bot);

  // Direction arrows
  const arrowColor = '#2a4f70';
  const as = H * 0.028;
  drawArrow(batX, top, r1x, top, arrowColor, as);
  drawArrow(r2x + COMP_W, top, rightX, top, arrowColor, as);
  drawArrow(rightX, top + (bot-top)*0.3, rightX, bot, arrowColor, as);
  drawArrow(rightX, bot, batX, bot, arrowColor, as);

  // ── Battery / Pump ──
  ctx.fillStyle = '#0d2035';
  ctx.strokeStyle = mode === 'water' ? '#38bdf8' : '#f59e0b';
  ctx.lineWidth = 2;
  rr(batX - 16, batMidY - batH/2, 32, batH, 5); ctx.fill(); ctx.stroke();

  const fs = (s) => `${Math.round(H*s)}px`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${fs(0.058)} Inter, system-ui, sans-serif`;
  ctx.fillStyle = mode === 'water' ? '#38bdf8' : '#f59e0b';
  ctx.fillText(mode === 'water' ? '🌀' : '⚡', batX, batMidY);
  ctx.font = `600 ${fs(0.038)} Inter, system-ui, sans-serif`;
  ctx.fillStyle = mode === 'water' ? '#bae6fd' : '#fde68a';
  ctx.fillText(mode === 'water' ? `${(VSUPPLY*2).toFixed(0)} psi` : `${VSUPPLY}V`, batX, batMidY - batH/2 - H*0.042);
  ctx.font = `bold ${fs(0.044)} Inter, system-ui, sans-serif`;
  ctx.fillStyle = mode === 'water' ? '#38bdf8' : '#f59e0b';
  ctx.fillText('IN', batX, top - H*0.032);
  ctx.fillStyle = '#475569';
  ctx.fillText('OUT', batX, bot + H*0.032);

  // ── Resistor R1 ──
  const v1frac = v1 / VSUPPLY;
  const r1col = lerpHex('#0060b0', '#00C9A7', v1frac);
  ctx.fillStyle = r1col + 'bb';
  ctx.strokeStyle = r1col; ctx.lineWidth = 2;
  rr(r1x, top - compH/2, COMP_W, compH, 4); ctx.fill(); ctx.stroke();

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e2e8f0';
  ctx.font = `bold ${fs(0.04)} Inter, system-ui, sans-serif`;
  ctx.fillText(mode === 'water' ? 'Constriction 1' : 'R₁', r1x + COMP_W/2, top - compH/2 - H*0.045);
  ctx.font = `${fs(0.036)} Inter, system-ui, sans-serif`;
  ctx.fillText(`${kvlR1} ${getResUnit()}`, r1x + COMP_W/2, top);
  ctx.fillStyle = r1col;
  ctx.font = `600 ${fs(0.036)} Inter, system-ui, sans-serif`;
  ctx.fillText(mode === 'water' ? `${(v1*2).toFixed(1)} psi drop` : `${v1.toFixed(1)} V`, r1x + COMP_W/2, top + compH/2 + H*0.04);

  // ── Resistor R2 ──
  const v2frac = v2 / VSUPPLY;
  const r2col = lerpHex('#0060b0', '#00C9A7', v2frac);
  ctx.fillStyle = r2col + 'bb';
  ctx.strokeStyle = r2col; ctx.lineWidth = 2;
  rr(r2x, top - compH/2, COMP_W, compH, 4); ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#e2e8f0';
  ctx.font = `bold ${fs(0.04)} Inter, system-ui, sans-serif`;
  ctx.fillText(mode === 'water' ? 'Constriction 2' : 'R₂', r2x + COMP_W/2, top - compH/2 - H*0.045);
  ctx.font = `${fs(0.036)} Inter, system-ui, sans-serif`;
  ctx.fillText(`${kvlR2} ${getResUnit()}`, r2x + COMP_W/2, top);
  ctx.fillStyle = r2col;
  ctx.font = `600 ${fs(0.036)} Inter, system-ui, sans-serif`;
  ctx.fillText(mode === 'water' ? `${(v2*2).toFixed(1)} psi drop` : `${v2.toFixed(1)} V`, r2x + COMP_W/2, top + compH/2 + H*0.04);

  // ── Voltage bars (right of circuit) ──
  const bx   = rightX + W * 0.055;
  const bw   = W * 0.07;
  const bmH  = (bot - top) * 0.82;
  const by   = top + (bot - top) * 0.09;

  ctx.fillStyle = '#0a1929';
  rr(bx, by, bw, bmH, 4); ctx.fill();

  const v1H = bmH * v1frac;
  const v2H = bmH * v2frac;

  // V1 stacked on top of V2 (v1 encountered first in circuit)
  ctx.fillStyle = '#00C9A7cc';
  rr(bx, by, bw, v1H, [4,4,0,0]); ctx.fill();
  ctx.fillStyle = '#0078c8bb';
  rr(bx, by + v1H, bw, v2H, [0,0,4,4]); ctx.fill();

  ctx.strokeStyle = '#040e1a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(bx, by+v1H); ctx.lineTo(bx+bw, by+v1H); ctx.stroke();

  const lfs = Math.round(H * 0.032);
  ctx.textAlign = 'left'; ctx.font = `600 ${lfs}px Inter, system-ui, sans-serif`;
  ctx.fillStyle = '#00C9A7';
  ctx.fillText(`${mode === 'water' ? 'P₁' : 'V₁'} = ${getVoltVal(v1)} ${getVoltUnit()}`, bx + bw + 6, by + v1H/2);
  ctx.fillStyle = '#0096c8';
  ctx.fillText(`${mode === 'water' ? 'P₂' : 'V₂'} = ${getVoltVal(v2)} ${getVoltUnit()}`, bx + bw + 6, by + v1H + v2H/2);
  ctx.fillStyle = '#64748b'; ctx.textAlign = 'center';
  ctx.font = `${lfs}px Inter, system-ui, sans-serif`;
  ctx.fillText(mode === 'water' ? 'Pressure' : 'Voltage', bx+bw/2, by - H*0.03);
  ctx.fillText('Drops', bx+bw/2, by - H*0.012);

  // ── KVL equation ──
  const eqV = (val) => mode === 'water' ? (val * 2).toFixed(1) : val.toFixed(1);
  const vUnit = getVoltUnit();
  ctx.fillText(`${mode === 'water' ? 'P₁ + P₂' : 'V₁ + V₂'}  =  ${eqV(v1)} + ${eqV(v2)}  =  ${eqV(VSUPPLY)} ${vUnit}  ✓`, W/2, bot + H*0.09);

  // ── Dots ──
  // Voltage at each waypoint (segment start):
  // wp0=5V, wp1=5V, wp2=5-v1, wp3=5-v1, wp4=0, wp5=0, wp6=0, wp7=0
  const wpV = [VSUPPLY, VSUPPLY, VSUPPLY-v1, VSUPPLY-v1, 0, 0, 0, 0];

  const dotR = H * 0.017;
  for (const dot of kvlDots) {
    const p = pathPos(kvlPath, dot.d);
    const si = p.segIdx;
    let color;
    if (si === 7) {
      color = mode === 'water' ? '#38bdf8' : '#f59e0b'; // battery/pump segment
    } else {
      // Interpolate voltage/pressure within segment for smooth color transition
      const seg = kvlPath.segs[si];
      const tSeg = (dot.d - seg.cum) / seg.len;
      const vStart = wpV[si];
      const vEnd   = wpV[(si+1) % 8];
      const vNow   = vStart + tSeg*(vEnd - vStart);
      const frac   = Math.max(0, Math.min(1, vNow / VSUPPLY));
      color = mode === 'water' ? lerpHex('#1e40af', '#38bdf8', frac) : lerpHex('#0060b0', '#00C9A7', frac);
    }
    drawDot(p.x, p.y, dotR * (mode === 'water' ? 1.4 : 1), color);
  }

  // ── Probe logic (KVL) ──
  let probe = null;
  const THR = 25;
  for (let i = 0; i < kvlPath.segs.length; i++) {
    const s = kvlPath.segs[i];
    const d = distToSeg(mx, my, s.ax, s.ay, s.bx, s.by);
    if (d < THR) {
      const t = Math.max(0, Math.min(1, ((mx - s.ax)*(s.bx-s.ax) + (my - s.ay)*(s.by-s.ay)) / (s.len*s.len || 1)));
      const vStart = wpV[i], vEnd = wpV[(i+1)%8];
      const curV = vStart + t * (vEnd - vStart);
      probe = { x: mx, y: my, v: curV, i: I, sIdx: i };
      break;
    }
  }
  if (probe) {
    ctx.strokeStyle = 'rgba(0, 201, 167, 0.3)'; ctx.lineWidth = 12;
    const s = kvlPath.segs[probe.sIdx];
    ctx.beginPath(); ctx.moveTo(s.ax, s.ay); ctx.lineTo(s.bx, s.by); ctx.stroke();
    drawProbe(probe.x, probe.y, probe.v, probe.i);
  }
}

// ─── KCL simulation ──────────────────────────────────────────────────────────
/*
  Parallel circuit:
  - Battery on left vertical
  - Top main wire: batX,top → junc1x,top  (both loops share)
  - Top junction at junc1x,top

  Loop 1 (R1, left branch):
    wp0=batX,top → wp1=junc1x,top → wp2=junc1x,bot → wp3=batX,bot
    (seg 3 is battery: bot→top)

  Loop 2 (R2, right branch):
    wp0=batX,top → wp1=junc1x,top → wp2=junc2x,top → wp3=junc2x,bot
    → wp4=junc1x,bot → wp5=batX,bot
    (seg 5 is battery: bot→top)

  Shared segments: wp0→wp1 (top main wire) and battery (both loops)
  Dot density on shared = N1+N2 = I_total. Dot density on each branch = Ik.
*/
const KCL_MAX = 30;
let kclGeo = null, kclPath1 = null, kclPath2 = null;
let kclDots1 = [], kclDots2 = [];

function buildKCLGeo() {
  const top    = H * 0.19;
  const bot    = H * 0.80;
  const batX   = W * 0.08;
  const junc1x = W * 0.36;
  const junc2x = W * 0.60;

  kclPath1 = buildPath([
    { x: batX,   y: top },   // 0
    { x: junc1x, y: top },   // 1  top junction
    { x: junc1x, y: bot },   // 2  bottom junction (R1 spans this seg)
    { x: batX,   y: bot },   // 3  bat-
  ]);
  kclPath2 = buildPath([
    { x: batX,   y: top },   // 0
    { x: junc1x, y: top },   // 1  top junction
    { x: junc2x, y: top },   // 2  top-right
    { x: junc2x, y: bot },   // 3  bot-right (R2 spans this seg)
    { x: junc1x, y: bot },   // 4  bottom junction
    { x: batX,   y: bot },   // 5  bat-
  ]);

  kclGeo = { top, bot, batX, junc1x, junc2x, _W: W, _H: H };
  resetKCLDots();
}

function resetKCLDots() {
  if (!kclPath1) return;
  const I1 = VSUPPLY / kclR1, I2 = VSUPPLY / kclR2;
  const n1 = Math.max(1, Math.round(KCL_MAX * I1 / (I1 + I2)));
  const n2 = Math.max(1, KCL_MAX - n1);
  kclDots1 = Array.from({ length: n1 }, (_, i) => ({ d: (i/n1) * kclPath1.total }));
  kclDots2 = Array.from({ length: n2 }, (_, i) => ({ d: (i/n2) * kclPath2.total }));
}

function drawKCL(dt) {
  if (!kclGeo || Math.abs(kclGeo._W - W) > 2) buildKCLGeo();
  const { top, bot, batX, junc1x, junc2x } = kclGeo;

  const I1 = VSUPPLY / kclR1, I2 = VSUPPLY / kclR2;
  const Itot = I1 + I2;

  // Recompute dot counts if resistances changed
  const n1want = Math.max(1, Math.round(KCL_MAX * I1 / Itot));
  const n2want = Math.max(1, KCL_MAX - n1want);
  if (kclDots1.length !== n1want || kclDots2.length !== n2want) resetKCLDots();

  // Speed: proportional to total current (both loops move at same speed)
  const baseItot = 2 * VSUPPLY / 3; // default R1=R2=3
  const speed = W * 0.12 * (Itot / baseItot) * dt;
  for (const d of kclDots1) d.d = (d.d + speed) % kclPath1.total;
  for (const d of kclDots2) d.d = (d.d + speed) % kclPath2.total;

  ctx.clearRect(0, 0, W, H);

  const batH   = H * 0.20;
  const batMidY = (top + bot) / 2;
  const compH  = H * 0.086;
  const COMP_W_KCL = Math.min(70, W * 0.095);
  const r1midY = (top + bot) / 2;
  const r2midY = (top + bot) / 2;

  // ── Wires / Pipes ──
  const wireColor = mode === 'water' ? '#1e40af' : '#1e3a5a';
  const pipeWidth = mode === 'water' ? 8 : 4;
  ctx.strokeStyle = wireColor; ctx.lineWidth = pipeWidth; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  function ws(x1,y1,x2,y2) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }

  // Battery left side
  ws(batX, top,             batX, batMidY - batH/2);
  ws(batX, batMidY + batH/2, batX, bot);
  // Top main wire (shared)
  ws(batX, top, junc1x, top);
  // Top bridge to right branch
  ws(junc1x, top, junc2x, top);
  // Bottom main wire (shared)
  ws(batX, bot, junc1x, bot);
  // Bottom bridge
  ws(junc1x, bot, junc2x, bot);
  // Left branch (R1): skip component area
  ws(junc1x, top, junc1x, r1midY - compH/2);
  ws(junc1x, r1midY + compH/2, junc1x, bot);
  // Right branch (R2): skip component area
  ws(junc2x, top, junc2x, r2midY - compH/2);
  ws(junc2x, r2midY + compH/2, junc2x, bot);

  // Direction arrows
  const ac = '#2a4f70', as2 = H * 0.025;
  drawArrow(batX, top, junc1x, top, ac, as2);
  drawArrow(junc1x, top, junc2x, top, ac, as2);
  drawArrow(junc1x, top + (bot-top)*0.25, junc1x, bot, ac, as2);
  drawArrow(junc2x, top + (bot-top)*0.25, junc2x, bot, ac, as2);
  drawArrow(junc2x, bot, junc1x, bot, ac, as2);
  drawArrow(junc1x, bot, batX, bot, ac, as2);

  // Junction dots
  const jr = H * 0.018;
  ctx.fillStyle = '#00C9A7';
  [{ x: junc1x, y: top }, { x: junc1x, y: bot }].forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, jr, 0, Math.PI*2); ctx.fill();
  });

  // ── Battery / Pump ──
  ctx.fillStyle = '#0d2035'; ctx.strokeStyle = mode === 'water' ? '#38bdf8' : '#f59e0b'; ctx.lineWidth = 2;
  rr(batX-16, batMidY-batH/2, 32, batH, 5); ctx.fill(); ctx.stroke();

  const fs = (s) => `${Math.round(H*s)}px`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${fs(0.058)} Inter, system-ui, sans-serif`;
  ctx.fillStyle = mode === 'water' ? '#38bdf8' : '#f59e0b'; ctx.fillText(mode === 'water' ? '🌀' : '⚡', batX, batMidY);
  ctx.font = `600 ${fs(0.038)} Inter, system-ui, sans-serif`;
  ctx.fillStyle = mode === 'water' ? '#bae6fd' : '#fde68a'; 
  ctx.fillText(mode === 'water' ? `${(VSUPPLY*2).toFixed(0)} psi` : `${VSUPPLY}V`, batX, batMidY - batH/2 - H*0.042);
  ctx.font = `bold ${fs(0.044)} Inter, system-ui, sans-serif`;
  ctx.fillStyle = mode === 'water' ? '#38bdf8' : '#f59e0b'; ctx.fillText(mode === 'water' ? 'IN' : '+', batX, top - H*0.032);
  ctx.fillStyle = '#475569'; ctx.fillText(mode === 'water' ? 'OUT' : '−', batX, bot + H*0.032);

  // ── R1 component ──
  ctx.fillStyle = '#00C9A7bb'; ctx.strokeStyle = '#00C9A7'; ctx.lineWidth = 2;
  rr(junc1x - COMP_W_KCL/2, r1midY - compH/2, COMP_W_KCL, compH, 4); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#e2e8f0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(mode === 'water' ? 'Constriction 1' : 'R₁', junc1x, r1midY - compH/2 - H*0.045);
  ctx.font = `${fs(0.036)} Inter, system-ui, sans-serif`;
  ctx.fillText(`${kclR1} ${getResUnit()}`, junc1x, r1midY);
  ctx.fillStyle = '#00C9A7';
  ctx.font = `600 ${fs(0.034)} Inter, system-ui, sans-serif`;
  ctx.fillText(mode === 'water' ? `Q₁=${getAmpVal(I1)} L/s` : `I₁=${getAmpVal(I1)} mA`, junc1x, r1midY + compH/2 + H*0.04);

  // ── R2 component ──
  ctx.fillStyle = '#0096c8bb'; ctx.strokeStyle = '#0096c8'; ctx.lineWidth = 2;
  rr(junc2x - COMP_W_KCL/2, r2midY - compH/2, COMP_W_KCL, compH, 4); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#e2e8f0';
  ctx.font = `bold ${fs(0.04)} Inter, system-ui, sans-serif`;
  ctx.fillText(mode === 'water' ? 'Constriction 2' : 'R₂', junc2x, r2midY - compH/2 - H*0.045);
  ctx.font = `${fs(0.036)} Inter, system-ui, sans-serif`;
  ctx.fillText(`${kclR2} ${getResUnit()}`, junc2x, r2midY);
  ctx.fillStyle = '#0096c8';
  ctx.font = `600 ${fs(0.034)} Inter, system-ui, sans-serif`;
  ctx.fillText(mode === 'water' ? `Q₂=${getAmpVal(I2)} L/s` : `I₂=${getAmpVal(I2)} mA`, junc2x, r2midY + compH/2 + H*0.04);

  // ── Current bars (right side) ──
  const bx  = junc2x + W * 0.08;
  const bw  = W * 0.07;
  const bmH = (bot - top) * 0.82;
  const by  = top + (bot - top) * 0.09;
  const maxItot = 2 * VSUPPLY; // both R=1 → max
  const totalBarH = Math.min(bmH, bmH * (Itot / maxItot));
  const i1H = totalBarH * (I1 / Itot);
  const i2H = totalBarH * (I2 / Itot);

  ctx.fillStyle = '#0a1929'; rr(bx, by, bw, bmH, 4); ctx.fill();
  ctx.fillStyle = '#00C9A7bb'; rr(bx, by + bmH - totalBarH, bw, i1H, [4,4,0,0]); ctx.fill();
  ctx.fillStyle = '#0096c8bb'; rr(bx, by + bmH - i2H, bw, i2H, [0,0,4,4]); ctx.fill();
  ctx.strokeStyle = '#040e1a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(bx, by+bmH-totalBarH+i1H); ctx.lineTo(bx+bw, by+bmH-totalBarH+i1H); ctx.stroke();

  const lfs = Math.round(H * 0.031);
  ctx.textAlign = 'left'; ctx.font = `600 ${lfs}px Inter, system-ui, sans-serif`;
  ctx.fillStyle = '#00C9A7';
  ctx.fillText(mode === 'water' ? `Q₁=${getAmpVal(I1)} ${getAmpUnit()}` : `I₁=${getAmpVal(I1)} ${getAmpUnit()}`, bx+bw+5, by+bmH-totalBarH+i1H/2);
  ctx.fillStyle = '#0096c8';
  ctx.fillText(mode === 'water' ? `Q₂=${getAmpVal(I2)} ${getAmpUnit()}` : `I₂=${getAmpVal(I2)} ${getAmpUnit()}`, bx+bw+5, by+bmH-i2H/2);
  ctx.fillStyle = '#64748b'; ctx.textAlign = 'center';
  ctx.font = `${lfs}px Inter, system-ui, sans-serif`;
  ctx.fillText(mode === 'water' ? 'Flow Rate' : 'Current', bx+bw/2, by-H*0.03);

  // ── KCL equation ──
  const i1Lbl = getAmpVal(I1), i2Lbl = getAmpVal(I2), itotLbl = getAmpVal(Itot);
  const qUnit = getAmpUnit();
  ctx.font = `${Math.round(H*0.041)}px Inter, system-ui, sans-serif`;
  ctx.textAlign = 'center'; ctx.fillStyle = '#94a3b8';
  ctx.fillText(`${mode === 'water' ? 'Q₁ + Q₂' : 'I₁ + I₂'}  =  ${i1Lbl} + ${i2Lbl}  =  ${itotLbl} ${qUnit}  ✓`, W/2, bot + H*0.09);

  // ── Dots ──
  // Loop 1: seg 3 = battery (teal → orange)
  // Loop 2: seg 5 = battery (blue → orange)
  const dotR = H * 0.016;
  for (const dot of kclDots1) {
    const p = pathPos(kclPath1, dot.d);
    drawDot(p.x, p.y, dotR, p.segIdx === 3 ? '#f59e0b' : '#00C9A7');
  }
  for (const dot of kclDots2) {
    const p = pathPos(kclPath2, dot.d);
    const color = p.segIdx === 5 ? (mode === 'water' ? '#38bdf8' : '#f59e0b') : '#0096c8';
    drawDot(p.x, p.y, dotR * (mode === 'water' ? 1.4 : 1), color);
  }

  // ── Probe logic (KCL) ──
  let probe = null;
  const THR = 25;
  // Check main shared wires and branches
  const paths = [
    { p: kclPath1, currents: [Itot, I1, I1, Itot], voltages: [VSUPPLY, 5, 0, 0] },
    { p: kclPath2, currents: [Itot, I2, I2, I2, I2, Itot], voltages: [VSUPPLY, 5, 5, 5, 0, 0] }
  ];

  for (const entry of paths) {
    for (let i = 0; i < entry.p.segs.length; i++) {
      const s = entry.p.segs[i];
      if (distToSeg(mx, my, s.ax, s.ay, s.bx, s.by) < THR) {
        probe = { x: mx, y: my, v: entry.voltages[i], i: entry.currents[i], sIdx: i, seg: s };
        break;
      }
    }
    if (probe) break;
  }

  if (probe) {
    ctx.strokeStyle = 'rgba(0, 201, 167, 0.3)'; ctx.lineWidth = 12;
    ctx.beginPath(); ctx.moveTo(probe.seg.ax, probe.seg.ay); ctx.lineTo(probe.seg.bx, probe.seg.by); ctx.stroke();
    drawProbe(probe.x, probe.y, probe.v, probe.i);
  }
}

// ─── Animation loop ───────────────────────────────────────────────────────────
let prevT = null;
function loop(ts) {
  if (prevT === null) prevT = ts;
  const dt = Math.min((ts - prevT) / 1000, 0.05);
  prevT = ts;
  if (W === 0) resizeCanvas();
  if (tab === 'kvl') drawKVL(dt); 
  else if (tab === 'kcl') drawKCL(dt);
  else drawPipeLogic(dt);
  requestAnimationFrame(loop);
}

// ─── Pipe Logic simulation ──────────────────────────────────────────────────
let pipeDots = [];
let pipePath1 = null, pipePath2 = null;

function buildPipeGeo(geo) {
  const { top, bot, batX } = geo;
  const midY = (top + bot) / 2;
  const leftX = batX;
  const splitX = W * 0.3;
  const rejoinX = W * 0.7;
  const innerH = H * 0.2;
  const outerH = H * 0.4;
  
  // Create two paths that share the pump and return sections
  // Path 1 (Top Branch): Pump -> Split -> Top Rect -> Rejoin -> Return
  pipePath1 = buildPath([
    { x: leftX, y: midY },       // 0: Pump
    { x: splitX, y: midY },      // 1: Split point
    { x: splitX, y: midY - innerH }, // 2: Up
    { x: rejoinX, y: midY - innerH }, // 3: Across
    { x: rejoinX, y: midY },     // 4: Rejoin point
    { x: rejoinX, y: midY + outerH }, // 5: Down (return)
    { x: leftX, y: midY + outerH },   // 6: Left (return)
  ]);
  
  // Path 2 (Bottom Branch): Pump -> Split -> Bottom Rect -> Rejoin -> Return
  pipePath2 = buildPath([
    { x: leftX, y: midY },       // 0: Pump
    { x: splitX, y: midY },      // 1: Split point
    { x: splitX, y: midY + innerH }, // 2: Down
    { x: rejoinX, y: midY + innerH }, // 3: Across
    { x: rejoinX, y: midY },     // 4: Rejoin point
    { x: rejoinX, y: midY + outerH }, // 5: Down (return)
    { x: leftX, y: midY + outerH },   // 6: Left (return)
  ]);
}

function drawPipeLogic(dt) {
  if (!kclGeo || Math.abs(kclGeo._W - W) > 2 || !pipePath1) {
    buildKCLGeo();
    buildPipeGeo(kclGeo);
    pipeDots = []; // Reset dots for new path
  }
  
  const { top, bot, batX } = kclGeo;
  const midY = (top + bot) / 2;
  const splitX = W * 0.3, rejoinX = W * 0.7;
  const innerH = H * 0.2, outerH = H * 0.4;
  
  const I1 = VSUPPLY / kclR1, I2 = VSUPPLY / kclR2, Itot = I1 + I2;
  
  ctx.clearRect(0, 0, W, H);
  
  // ── Pipes ──
  const pipeCol = '#1e40af';
  ctx.strokeStyle = pipeCol; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  
  // Draw the Loop Structure
  ctx.beginPath();
  // Return section (Rejoin -> Bottom -> Left -> Pump)
  ctx.moveTo(rejoinX, midY); 
  ctx.lineTo(rejoinX, midY + outerH);
  ctx.lineTo(batX, midY + outerH);
  ctx.lineTo(batX, midY); // Leads to Pump
  // Main start (Pump -> Split)
  ctx.lineTo(splitX, midY);
  ctx.stroke();
  
  // The Split (Top & Bottom Branches)
  ctx.beginPath();
  // Top Branch
  ctx.moveTo(splitX, midY);
  ctx.lineTo(splitX, midY - innerH);
  ctx.lineTo(rejoinX, midY - innerH);
  ctx.lineTo(rejoinX, midY);
  // Bottom Branch
  ctx.moveTo(splitX, midY);
  ctx.lineTo(splitX, midY + innerH);
  ctx.lineTo(rejoinX, midY + innerH);
  ctx.lineTo(rejoinX, midY);
  ctx.stroke();
  
  // ── Components ──
  // Pump
  ctx.fillStyle = '#0f172a'; ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(batX, midY, 24, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#38bdf8'; ctx.font = '24px Inter'; ctx.textAlign = 'center'; ctx.textBaseline='middle';
  ctx.fillText('🌀', batX, midY);

  // Valves/Resistors (Constrictions)
  const drawValve = (x, y, r, color, label) => {
    const vW = 40, vH = 20;
    ctx.fillStyle = color + 'bb'; ctx.strokeStyle = color;
    rr(x - vW/2, y - vH/2, vW, vH, 4); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#e2e8f0'; ctx.font = 'bold 10px Inter';
    ctx.fillText(label, x, y - 18);
    ctx.font = '9px Inter';
    ctx.fillText(`${r} ${getResUnit()}`, x, y);
  };
  drawValve((splitX + rejoinX)/2, midY - innerH, kclR1, '#00C9A7', mode === 'water' ? 'VALVE 1' : 'RESISTOR 1');
  drawValve((splitX + rejoinX)/2, midY + innerH, kclR2, '#0096c8', mode === 'water' ? 'VALVE 2' : 'RESISTOR 2');

  // Labels
  ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 14px Inter';
  ctx.fillText(mode === 'water' ? 'PUMP' : 'BATTERY', batX, midY - 35);
  ctx.fillStyle = '#38bdf8'; ctx.font = 'bold 12px Inter';
  ctx.fillText(mode === 'water' ? 'SPLIT' : 'JUNCTION', splitX, midY - 15);
  ctx.fillText(mode === 'water' ? 'JOIN' : 'MERGE', rejoinX, midY - 15);
  
  ctx.fillStyle = mode === 'water' ? '#38bdf8' : '#00C9A7'; ctx.textAlign = 'right';
  ctx.fillText(`${mode === 'water' ? 'Flow Q₁' : 'Current I₁'}: ${getAmpVal(I1)} ${getAmpUnit()}`, rejoinX - 10, midY - innerH + 30);
  ctx.fillText(`${mode === 'water' ? 'Flow Q₂' : 'Current I₂'}: ${getAmpVal(I2)} ${getAmpUnit()}`, rejoinX - 10, midY + innerH + 30);
  ctx.fillStyle = '#e2e8f0'; ctx.textAlign = 'left';
  ctx.fillText(`${mode === 'water' ? 'Total Q' : 'Total I'}: ${getAmpVal(Itot)} ${getAmpUnit()}`, batX + 35, midY - 10);

  // ── Animated Dots ──
  const baseItot = 2 * VSUPPLY / 3;
  const speed = W * 0.12 * (Itot / baseItot) * dt;
  if (pipeDots.length === 0) {
    const n1 = 15, n2 = 15;
    for(let i=0; i<n1; i++) pipeDots.push({ d: (i/n1)*pipePath1.total, pathIdx: 1 });
    for(let i=0; i<n2; i++) pipeDots.push({ d: (i/n2)*pipePath2.total, pathIdx: 2 });
  }
  
  pipeDots.forEach(dot => {
    dot.d = (dot.d + speed);
    const path = dot.pathIdx === 1 ? pipePath1 : pipePath2;
    dot.d %= path.total;
    const p = pathPos(path, dot.d);
    const dotCol = mode === 'water' ? (dot.pathIdx === 1 ? '#5ccfbb' : '#38bdf8') : '#fde68a';
    drawDot(p.x, p.y, mode === 'water' ? 6 : 4, dotCol);
  });
}

function setTab(t) {
  tab = t;
  document.getElementById('btn-kvl').classList.toggle('active', t === 'kvl');
  document.getElementById('btn-kcl').classList.toggle('active', t === 'kcl');
  document.getElementById('btn-pipe').classList.toggle('active', t === 'pipe');
  document.getElementById('ctrl-kvl').style.display = t === 'kvl' ? 'flex' : 'none';
  document.getElementById('ctrl-kcl').style.display = (t === 'kcl' || t === 'pipe') ? 'flex' : 'none';
}
function onKvlSlider() {
  kvlR1 = +document.getElementById('kvl-r1').value;
  kvlR2 = +document.getElementById('kvl-r2').value;
  const unit = getResUnit();
  document.getElementById('kvl-r1-v').textContent = kvlR1 + ' ' + unit;
  document.getElementById('kvl-r2-v').textContent = kvlR2 + ' ' + unit;
}
function onKclSlider() {
  kclR1 = +document.getElementById('kcl-r1').value;
  kclR2 = +document.getElementById('kcl-r2').value;
  const unit = getResUnit();
  document.getElementById('kcl-r1-v').textContent = kclR1 + ' ' + unit;
  document.getElementById('kcl-r2-v').textContent = kclR2 + ' ' + unit;
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-electric').classList.toggle('active', m === 'electric');
  document.getElementById('mode-water').classList.toggle('active', m === 'water');
  onKvlSlider();
  onKclSlider();
}

// Initial tab/mode from URL params
const params = new URLSearchParams(location.search);
const urlTab = params.get('tab');
const urlMode = params.get('mode');
if (urlMode) setMode(urlMode === 'water' ? 'water' : 'electric');
else setMode('electric');
setTab(['kvl', 'kcl', 'pipe'].includes(urlTab) ? urlTab : 'kvl');

resizeCanvas();
requestAnimationFrame(loop);
</script>
